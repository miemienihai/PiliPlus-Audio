workflows:
  android-apk-build:
    name: Android APK Build
    max_build_duration: 60

    environment:
      flutter: 3.41.5
      xcode: latest
      vars:
        PACKAGE_NAME: "com.example.piliplus"

    triggering:
      events:
        - push

    scripts:
      - name: Check Flutter version
        script: flutter --version

      - name: Clean project
        script: flutter clean

      - name: Get dependencies
        script: flutter pub get

      # 如果你有 codegen（你这里有 build_runner）
      - name: Generate files
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        script: |
          flutter build apk \
            --release \
            --split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - xiaogesong146@gmail.com
